type: object
required:
  - description
  - emergencyTypeId
  - emergencyIndex
properties:
  description:
    type: string
  emergencyTypeId:
    type: integer
    format: int64
  emergencyIndex:
    type: string
    enum: [ EXTINGUIDO, CERO, UNO, DOS, TRES ]
example:
  description: "Fuego en zona forestal cerca de A Coruña"
  emergencyTypeId: 1
  emergencyIndex: "DOS"
