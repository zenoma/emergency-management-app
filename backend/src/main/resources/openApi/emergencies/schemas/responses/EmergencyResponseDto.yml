type: object
required:
  - id
  - description
  - emergencyTypeName
  - emergencyIndex
  - createdAt
  - extinguishedAt
properties:
  id:
    type: integer
    format: int64
  description:
    type: string
  emergencyTypeName:
    type: string
  emergencyIndex:
    type: string
    enum: [ EXTINGUIDO, CERO, UNO, DOS, TRES ]
  createdAt:
    type: string
    format: localDateTime
  extinguishedAt:
    type: string
    format: localDateTime
  location:
    $ref: "../../../common/schemas/CoordinatesDto.yml"
  quadrantInfo:
    type: array
    items:
      $ref: "../../../quadrants/schemas/responses/QuadrantDto.yml"
