get:
  summary: Información de un emergencia por ID
  operationId: getEmergencyById
  tags:
    - EmergencyManagement
  security:
    - bearerAuth: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: './schemas/responses/EmergencyResponseDto.yml'

put:
  summary: Actualizar nueva emergencia
  operationId: putEmergency
  tags:
    - EmergencyManagement
  security:
    - bearerAuth: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: './schemas/requests/EmergencyRequestDto.yml'
  responses:
    '200':
      description: Created
      content:
        application/json:
          schema:
            $ref: './schemas/responses/EmergencyResponseDto.yml'
