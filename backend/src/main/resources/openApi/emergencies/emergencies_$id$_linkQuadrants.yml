post:
  summary: Link an emergency to a list of quadrants
  operationId: postLinkEmergencyToQuadrants
  tags:
    - EmergencyManagement
  security:
    - bearerAuth: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: './schemas/requests/LinkQuadrantsRequestDto.yml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: './schemas/responses/EmergencyResponseDto.yml'
