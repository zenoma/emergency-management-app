put:
  summary: Actualizar estado de la asignación
  operationId: putAssignmentStatus
  tags:
    - AssignmentManagement
  security:
    - bearerAuth: [ ]
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: './schemas/requests/AssignmentStatusRequestDto.yml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: './schemas/responses/AssignmentResponseDto.yml'
