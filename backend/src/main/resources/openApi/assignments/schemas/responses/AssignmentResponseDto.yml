type: object
required:
  - id
  - emergencyQuadrantId
  - resourceId
  - status
properties:
  id:
    type: integer
    format: int64
  emergencyQuadrantId:
    type: integer
    format: int64
  resourceId:
    type: integer
    format: int64
  status:
    type: string
    enum: [ PENDING, ACCEPTED, COMPLETED ]
  notes:
    type: string
  assignedAt:
    type: string
    format: localDateTime
  acceptedAt:
    type: string
    format: localDateTime
  completedAt:
    type: string
    format: localDateTime
